name: Demo App
description: A simple demo app for testing Fileglancer job submission. Sleeps and prints messages.

runnables:
  - id: run
    name: Run Demo
    requirements:
      - "pixi>=0.40"
    description: Sleep for a specified duration and print a message repeatedly.
    command: pixi run python demo.py
    parameters:
      - flag: --message
        name: Message
        type: string
        description: The message to print
        required: true
        default: "Hello from Fileglancer!"

      - flag: --repeat
        name: Repeat Count
        type: integer
        description: Number of times to repeat the message
        required: false
        default: 3
        min: 1
        max: 100

      - flag: --output_dir
        name: Output Directory
        type: directory
        description: Directory to write a summary output file (optional)
        required: false

      - section: Advanced Options
        description: Optional tuning parameters
        collapsed: true
        parameters:
          - flag: --sleep_seconds
            name: Sleep Duration
            type: integer
            description: Number of seconds to sleep between messages
            required: false
            default: 5
            min: 0
            max: 300

          - flag: --verbose
            name: Verbose
            type: boolean
            description: Enable verbose output with sleep countdown
            required: false
            default: false

          - flag: --log_level
            name: Log Level
            type: enum
            description: Set the logging verbosity level
            options:
              - DEBUG
              - INFO
              - WARNING
              - ERROR
            default: INFO
            hidden: true

    resources:
      cpus: 1
      memory: "1 GB"
      walltime: "00:10"

  - id: serve
    name: Demo Service
    requirements:
      - "pixi>=0.40"
    type: service
    description: Start a simple HTTP server that displays a status page. Runs until stopped.
    command: pixi run python demo_service.py
    parameters:
      - flag: --message
        name: Message
        type: string
        description: Message to display on the status page
        required: false
        default: "Hello from Fileglancer!"

      - flag: --port
        name: Port
        type: integer
        description: Port to listen on (0 = auto-detect a free port)
        required: false
        default: 0
        min: 0
        max: 65535

    resources:
      cpus: 1
      memory: "1 GB"
      walltime: "08:00"

  - id: mandelbrot
    name: Mandelbrot (Conda)
    description: Render the Mandelbrot set as ASCII art with NumPy, running inside a conda environment.
    command: python mandelbrot.py
    conda_env: fileglancer-demo
    requirements:
      - miniforge
    parameters:
      - flag: --width
        name: Width
        type: integer
        description: Width of the rendering in characters
        required: false
        default: 120
        min: 20
        max: 500

      - flag: --height
        name: Height
        type: integer
        description: Height of the rendering in characters
        required: false
        default: 40
        min: 10
        max: 200

      - flag: --zoom
        name: Zoom
        type: number
        description: Zoom factor into the view center
        required: false
        default: 1.0
        min: 0.1
        max: 100000

      - section: View Region
        description: Where to look in the complex plane
        collapsed: true
        parameters:
          - flag: --center_x
            name: Center X
            type: number
            description: Real coordinate of the view center (try -0.7453 with zoom 200)
            required: false
            default: -0.75
            min: -2.5
            max: 1.5

          - flag: --center_y
            name: Center Y
            type: number
            description: Imaginary coordinate of the view center (try 0.1127 with zoom 200)
            required: false
            default: 0.0
            min: -1.5
            max: 1.5

          - flag: --iterations
            name: Max Iterations
            type: integer
            description: Maximum iterations per pixel (higher = more detail at high zoom)
            required: false
            default: 80
            min: 10
            max: 5000

      - flag: --output_dir
        name: Output Directory
        type: directory
        description: Directory to write the rendering as a text file (optional)
        required: false

    resources:
      cpus: 1
      memory: "1 GB"
      walltime: "00:10"

  - id: lolcow
    name: Demo Container
    requirements:
      - apptainer
    description: Print a message with a talking cow using the classic lolcow Apptainer container.
    command: cowsay
    container: godlovedc/lolcow
    parameters:
      - name: Message
        type: string
        description: What the cow should say
        required: true
        default: "Hello from Fileglancer!"

    resources:
      cpus: 1
      memory: "1 GB"
      walltime: "00:05"
